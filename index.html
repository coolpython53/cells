<!DOCTYPE html>
<html>
<head>
    <title>Pixel Grid</title>
    <style>
        body { margin: 0; background: #222; color: white; font-family: sans-serif; text-align: center; }
        #nav { background: #333; padding: 10px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: center; gap: 15px; align-items: center; }
        #container { width: 100vw; height: calc(100vh - 60px); overflow: auto; background: #444; }
        canvas { background: white; image-rendering: pixelated; cursor: crosshair; display: block; margin: 0 auto; }
        .ready { color: #0f0; } .busy { color: #f00; }
    </style>
</head>
<body>

<div id="nav">
    <input type="color" id="picker" value="#ff0000">
    <div id="status" class="ready">Ready</div>
    <div id="timer">0s</div>
</div>

<div id="container">
    <canvas id="cv" width="1000" height="1000" style="width:2000px; height:2000px;"></canvas>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbxUhcHKbXAvsP_KhDTDc9AOWgaifOz6NTS0GGbTIG-9vBIcN1z3k7Hf5E9eivHMfIiutA/exec";
    const TOKEN = "1341323124312432141342312431427646";
    const canvas = document.getElementById('cv');
    const ctx = canvas.getContext('2d');
    const timerEl = document.getElementById('timer');
    const statusEl = document.getElementById('status');
    let canClick = false;

    // 1. Load Data
    async function load() {
        statusEl.innerText = "Loading Sheet...";
        try {
            const r = await fetch(API + "?t=" + Date.now());
            const data = await r.json();
            data.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 1, 1);
            });
            checkTime();
        } catch(e) {
            console.error(e);
            statusEl.innerText = "Load Failed";
            checkTime();
        }
    }

    // 2. Timer Logic (Persists through reload)
    function checkTime() {
        const last = localStorage.getItem('last_px');
        const diff = Date.now() - (last || 0);
        if (diff < 40000) {
            startTimer(Math.ceil((40000 - diff) / 1000));
        } else {
            ready();
        }
    }

    function startTimer(s) {
        canClick = false;
        statusEl.innerText = "Cooldown";
        statusEl.className = "busy";
        const iv = setInterval(() => {
            s--;
            timerEl.innerText = s + "s";
            if (s <= 0) {
                clearInterval(iv);
                ready();
            }
        }, 1000);
    }

    function ready() {
        canClick = true;
        statusEl.innerText = "Ready";
        statusEl.className = "ready";
        timerEl.innerText = "0s";
    }

    // 3. Click to Save
    canvas.addEventListener('click', async (e) => {
        if (!canClick) return;

        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
        const y = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));
        const color = document.getElementById('picker').value;

        // Visual update
        ctx.fillStyle = color;
        ctx.fillRect(x, y, 1, 1);

        // Lock & Save
        localStorage.setItem('last_px', Date.now());
        startTimer(40);

        try {
            // POST to Google
            await fetch(API, {
                method: "POST",
                mode: "no-cors", 
                body: JSON.stringify({ x, y, color, token: TOKEN })
            });
            console.log("Sent request for:", x, y);
        } catch(err) {
            alert("Save failed! Check console.");
        }
    });

    load();
</script>
</body>
</html>
