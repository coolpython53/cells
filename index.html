<!DOCTYPE html>
<html>
<head>
    <title>Million Cell Canvas</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f0f0; }
        #controls { margin: 10px; padding: 10px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        canvas { border: 1px solid #000; background: white; cursor: crosshair; }
        #timer { font-weight: bold; color: #d32f2f; }
    </style>
</head>
<body>

    <div id="controls">
        <input type="color" id="colorPicker" value="#000000">
        <span id="coords">X: 0, Y: 0</span>
        | Next click in: <span id="timer">Ready</span>
    </div>

    <canvas id="gridCanvas" width="1000" height="1000"></canvas>

    <script>
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const timerDisplay = document.getElementById('timer');
        const API_URL = 'YOUR_GOOGLE_SCRIPT_URL_HERE';
        
        let canPixel = true;
        let cooldown = 40;

        // Initialize Canvas with "transparent" (white)
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, 1000, 1000);

        canvas.addEventListener('click', (e) => {
            if (!canPixel) return;

            const rect = canvas.getBoundingClientRect();
            const x = Math.floor(e.clientX - rect.left);
            const y = Math.floor(e.clientY - rect.top);
            const color = colorPicker.value;

            drawPixel(x, y, color);
            uploadPixel(x, y, color);
            startCooldown();
        });

        function drawPixel(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, 1, 1);
        }

        async function uploadPixel(x, y, color) {
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ x, y, color })
                });
            } catch (err) {
                console.error("Upload failed", err);
            }
        }

        function startCooldown() {
            canPixel = false;
            let timeLeft = cooldown;
            const interval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = `${timeLeft}s`;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    canPixel = true;
                    timerDisplay.innerText = "Ready";
                }
            }, 1000);
        }

        // Mouse move to show coordinates
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            document.getElementById('coords').innerText = 
                `X: ${Math.floor(e.clientX - rect.left)}, Y: ${Math.floor(e.clientY - rect.top)}`;
        });
    </script>
</body>
</html>
